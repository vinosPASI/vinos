syntax = "proto3";

package stuko.api.v1.inventory;

option go_package = "github.com/vinosPASI/vinos/backend/api/proto/v1/inventorypb;inventorypb";

import "google/api/annotations.proto";

// Servicio central para la gestión de productos y stock de inventario
service InventoryService {
  rpc ListInventoryItems(ListInventoryItemsRequest) returns (ListInventoryItemsResponse) {
    option (google.api.http) = {
      post: "/v1/inventory/list"
      body: "*"
    };
  }
  rpc GetInventoryItem(GetInventoryItemRequest) returns (GetInventoryItemResponse) {
    option (google.api.http) = {
      get: "/v1/inventory/{id}"
    };
  }
  rpc CreateInventoryItem(CreateInventoryItemRequest) returns (CreateInventoryItemResponse) {
    option (google.api.http) = {
      post: "/v1/inventory"
      body: "*"
    };
  }
  rpc UpdateInventoryItem(UpdateInventoryItemRequest) returns (UpdateInventoryItemResponse) {
    option (google.api.http) = {
      put: "/v1/inventory/{id}"
      body: "*"
    };
  }
  rpc DeleteInventoryItem(DeleteInventoryItemRequest) returns (DeleteInventoryItemResponse) {
    option (google.api.http) = {
      delete: "/v1/inventory/{id}"
    };
  }
  
  // Registra una entrada o salida de stock y actualiza el inventario general
  rpc RecordMovement(RecordMovementRequest) returns (RecordMovementResponse) {
    option (google.api.http) = {
      post: "/v1/inventory/movement"
      body: "*"
    };
  }
}

message ListInventoryItemsRequest {
  int32 page = 1;
  int32 limit = 2;
  string filter = 3;
}

message ListInventoryItemsResponse {
  repeated InventoryItem items = 1;
  int32 total_items = 2;
  int32 total_pages = 3;
}

message GetInventoryItemRequest {
  string id = 1;
}

message InventoryItem {
  string id = 1;
  string name = 2;
  string type = 3;
  int32 quantity = 4;
  string unit = 5;
  string sku = 6;
  int32 real_stock = 7;
  int32 net_stock = 8;
  string warehouse = 9;
  string created_at = 10;
  string updated_at = 11;
}

message Movement {
  string date = 1;
  string type = 2;
  string reference = 3;
  int32 quantity = 4;
}

message StockPoint {
  float x = 1;
  float y = 2;
}

message GetInventoryItemResponse {
  InventoryItem item = 1;
  // Detail fields for dashboard projections
  int32 runway_days = 2;
  string stockout_date = 3;
  repeated StockPoint consumption_history = 4;
  repeated Movement movement_history = 5;
}

message CreateInventoryItemRequest {
  string name = 1;
  string type = 2;
  int32 quantity = 3;
  string unit = 4;
  string sku = 5;
  string warehouse = 6;
}

message CreateInventoryItemResponse {
  InventoryItem item = 1;
}

message UpdateInventoryItemRequest {
  string id = 1;
  string name = 2;
  string type = 3;
  int32 quantity = 4;
  string unit = 5;
  string sku = 6;
  string warehouse = 7;
}

message UpdateInventoryItemResponse {
  InventoryItem item = 1;
}

message DeleteInventoryItemRequest {
  string id = 1;
}

message DeleteInventoryItemResponse {
  bool success = 1;
}

message RecordMovementRequest {
  string item_id = 1;
  string movement_type = 2; // IN or OUT
  int32 quantity = 3;
  string reason = 4;
  string reference_id = 5;
}

message RecordMovementResponse {
  bool success = 1;
  InventoryItem updated_item = 2;
  string movement_id = 3;
}

