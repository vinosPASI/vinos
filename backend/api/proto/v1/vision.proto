syntax = "proto3";

package stuko.api.v1.vision;

option go_package = "github.com/vinosPASI/vinos/backend/api/proto/v1/visionpb;visionpb";

import "google/api/annotations.proto";

// Analiza una etiqueta de vino para extraer su información

service VisionService {
  rpc AnalyzeWineLabel(AnalyzeWineLabelRequest) returns (AnalyzeWineLabelResponse) {
    option (google.api.http) = {
      post: "/v1/vision/analyze"
      body: "*"
    };
  }
}

message AnalyzeWineLabelRequest {
  string image_reference = 1;
}

message AnalyzeWineLabelResponse {
  string raw_ocr_text = 1;
  ImageClassification classification = 2;
  StructuredWineData wine_data = 3;
}

message ImageClassification {
  string label = 1;
  float confidence_level = 2;
}

message StructuredWineData {
  string brand = 1;
  string cepa_variedad = 2;
  int32 vintage_year = 3;
  string volume_content = 4;
}