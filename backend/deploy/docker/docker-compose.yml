version: '3.8'

services:
  # ── Backend Go (gRPC + HTTP) ──
  backend:
    build:
      context: ../../
      dockerfile: build/package/Dockerfile.backend
    container_name: smartwinery_backend
    environment:
      POCKETBASE_URL: http://pocketbase:8090
      POCKETBASE_ADMIN_EMAIL: ${POCKETBASE_ADMIN_EMAIL}
      POCKETBASE_ADMIN_PASSWORD: ${POCKETBASE_ADMIN_PASSWORD}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-admin_winery}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-SmartPassword123!}
      GRPC_PORT: ":50051"
      HTTP_PORT: ":8081"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "50051:50051"
      - "8081:8081"
    depends_on:
      - pocketbase
      - minio
    restart: unless-stopped

  # ── PocketBase (Auth & DB) ──
  pocketbase:
    build:
      context: ../../build/package
      dockerfile: Dockerfile.pocketbase
    container_name: smartwinery_pocketbase
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/pb/pb_data
    restart: unless-stopped

  # ── MinIO (Object Storage) ──
  minio:
    image: quay.io/minio/minio:latest
    container_name: smartwinery_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin_winery}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-SmartPassword123!}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  # ── Elasticsearch ──
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: smartwinery_elastic
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped

  # ── Envoy (API Gateway / gRPC-JSON Transcoder) ──
  envoy:
    build:
      context: ../../build/envoy
      dockerfile: Dockerfile.envoy
    container_name: smartwinery_envoy
    ports:
      - "8080:8080"
      - "9901:9901"
    volumes:
      - ../../build/envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ../../build/envoy/api_descriptor.pb:/etc/envoy/api_descriptor.pb:ro
    depends_on:
      - backend
    restart: unless-stopped

  # ── Cloudflare Tunnel (expone winery-api.stuko.dev) ──
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: smartwinery_tunnel
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - envoy
    restart: unless-stopped

volumes:
  pb_data:
  minio_data:
  es_data: