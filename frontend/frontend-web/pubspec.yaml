name: frontend_web
description: Intelligent Wine Inventory Management Platform (Web)
version: 1.0.0+1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  dio: ^5.4.0
  go_router: ^17.0.0
  dio_http2_adapter: ^2.5.0
  fl_chart: ^0.63.0 # Para los gráficos de torta y tendencias
